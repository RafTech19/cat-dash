<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ff9ecf" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Ears -->
    <polygon points="12,22 20,4 28,20" fill="#ff9a56"/>
    <polygon points="36,20 44,4 52,22" fill="#ff9a56"/>
    <polygon points="15,20 20,10 25,19" fill="#ffb88a"/>
    <polygon points="39,19 44,10 49,20" fill="#ffb88a"/>
    <!-- Head -->
    <ellipse cx="32" cy="30" rx="22" ry="20" fill="#ff9a56"/>
    <!-- Body -->
    <ellipse cx="32" cy="52" rx="16" ry="12" fill="#ff9a56"/>
    <!-- Belly -->
    <ellipse cx="32" cy="54" rx="10" ry="7" fill="#ffe0c0"/>
    <!-- Eyes -->
    <ellipse cx="24" cy="28" rx="5" ry="6" fill="#fff"/>
    <ellipse cx="40" cy="28" rx="5" ry="6" fill="#fff"/>
    <ellipse cx="25" cy="29" rx="3" ry="4" fill="#1a1a2e"/>
    <ellipse cx="41" cy="29" rx="3" ry="4" fill="#1a1a2e"/>
    <circle cx="26" cy="27" r="1.2" fill="#fff"/>
    <circle cx="42" cy="27" r="1.2" fill="#fff"/>
    <!-- Nose -->
    <polygon points="32,33 29,36 35,36" fill="#ff6b8a"/>
    <!-- Mouth -->
    <path d="M32 36 Q28 40 26 38" stroke="#c45c2a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M32 36 Q36 40 38 38" stroke="#c45c2a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Whiskers -->
    <line x1="8" y1="30" x2="18" y2="31" stroke="#c45c2a" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="34" x2="18" y2="34" stroke="#c45c2a" stroke-width="1" stroke-linecap="round"/>
    <line x1="46" y1="31" x2="56" y2="30" stroke="#c45c2a" stroke-width="1" stroke-linecap="round"/>
    <line x1="46" y1="34" x2="56" y2="34" stroke="#c45c2a" stroke-width="1" stroke-linecap="round"/>
    <!-- Paws -->
    <ellipse cx="22" cy="60" rx="5" ry="3" fill="#ff9a56"/>
    <ellipse cx="42" cy="60" rx="5" ry="3" fill="#ff9a56"/>
    <!-- Tail -->
    <path d="M48 48 Q62 40 58 28 Q56 22 50 26" stroke="#ff9a56" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
